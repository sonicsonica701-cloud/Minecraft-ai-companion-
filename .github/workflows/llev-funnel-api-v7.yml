name: Llev Funnel API v7

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the temporary API alive, max 120"
        required: true
        default: "120"
      hostname_suffix:
        description: "Optional Tailscale hostname suffix"
        required: false
        default: "llev-api"

permissions:
  contents: write

jobs:
  approved-api:
    runs-on: windows-latest
    timeout-minutes: 130

    steps:
      - name: Check required secrets
        shell: pwsh
        run: |
          $missing = @()
          if (-not "${{ secrets.TAILSCALE_AUTH_KEY }}") { $missing += "TAILSCALE_AUTH_KEY" }
          if (-not "${{ secrets.LLEV_API_KEY }}") { $missing += "LLEV_API_KEY" }
          if ($missing.Count -gt 0) { Write-Error "Missing required repository secret(s): $($missing -join ', ')"; exit 1 }

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Tailscale
        shell: pwsh
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect to Tailscale
        shell: pwsh
        run: |
          $suffix = "${{ github.event.inputs.hostname_suffix }}"
          if (-not $suffix) { $suffix = "llev-api" }
          $hostname = "gh-$suffix-${{ github.run_id }}"
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=$hostname
          Start-Sleep -Seconds 5
          & "$env:ProgramFiles\Tailscale\tailscale.exe" status

      - name: Start tiny approved API
        shell: pwsh
        env:
          LLEV_API_KEY: ${{ secrets.LLEV_API_KEY }}
        run: |
          $script = @'
          param([string]$ApiKey, [string]$Workspace)
          $ErrorActionPreference = "Stop"
          $started = Get-Date
          $listener = [System.Net.HttpListener]::new()
          $listener.Prefixes.Add("http://127.0.0.1:8787/")
          $listener.Start()
          function Send-Json($ctx, [int]$status, $obj) {
            $json = $obj | ConvertTo-Json -Depth 6
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
            $ctx.Response.StatusCode = $status
            $ctx.Response.ContentType = "application/json"
            $ctx.Response.ContentLength64 = $bytes.Length
            $ctx.Response.OutputStream.Write($bytes, 0, $bytes.Length)
            $ctx.Response.OutputStream.Close()
          }
          while ($listener.IsListening) {
            $ctx = $listener.GetContext()
            try {
              if ($ctx.Request.Headers["x-api-key"] -ne $ApiKey) {
                Send-Json $ctx 401 @{ error = "unauthorised" }
                continue
              }
              $path = $ctx.Request.Url.AbsolutePath
              if ($path -eq "/health") {
                Send-Json $ctx 200 @{ status = "ok"; uptime_seconds = [int]((Get-Date) - $started).TotalSeconds }
              } elseif ($path -eq "/system-info") {
                Send-Json $ctx 200 @{ hostname = $env:COMPUTERNAME; os = (Get-CimInstance Win32_OperatingSystem).Caption; workspace = $Workspace }
              } elseif ($path -eq "/repo-files") {
                $items = Get-ChildItem -Path $Workspace | Select-Object -First 100 Name, @{n="type";e={ if ($_.PSIsContainer) { "folder" } else { "file" } }}
                Send-Json $ctx 200 @{ items = $items }
              } elseif ($path -eq "/repo-status") {
                $out = git -C $Workspace status --short 2>&1 | Out-String
                Send-Json $ctx 200 @{ stdout = $out; returncode = $LASTEXITCODE }
              } else {
                Send-Json $ctx 404 @{ error = "not found"; allowed = @("/health", "/system-info", "/repo-files", "/repo-status") }
              }
            } catch {
              Send-Json $ctx 500 @{ error = $_.Exception.Message }
            }
          }
          '@
          $scriptPath = "$env:RUNNER_TEMP\llev_api.ps1"
          $script | Set-Content -Path $scriptPath -Encoding UTF8
          Start-Job -FilePath $scriptPath -ArgumentList $env:LLEV_API_KEY, $env:GITHUB_WORKSPACE | Out-Null
          Start-Sleep -Seconds 3
          Invoke-WebRequest -UseBasicParsing -Headers @{"x-api-key" = $env:LLEV_API_KEY} http://127.0.0.1:8787/health

      - name: Save integration info and attempt Tailscale Funnel
        shell: pwsh
        continue-on-error: true
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $status = & $ts status --json | ConvertFrom-Json
          $dns = $status.Self.DNSName.TrimEnd('.')
          $baseUrl = "https://$dns"
          $info = [ordered]@{
            name = "Llev Runner API"
            baseUrl = $baseUrl
            authStyle = "api_key_header"
            authHeader = "x-api-key"
            safeTestPath = "/health"
            availablePaths = @("/health", "/system-info", "/repo-files", "/repo-status")
            runId = "${{ github.run_id }}"
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
          }
          $info | ConvertTo-Json -Depth 5 | Set-Content -Path "llev-funnel-info.json" -Encoding UTF8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add llev-funnel-info.json
          git commit -m "Update Llev Funnel integration info"
          if ($LASTEXITCODE -ne 0) { Write-Host "No integration info changes to commit or commit failed." }
          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) { Write-Host "Could not push integration info, continuing anyway." }
          Write-Host "CUSTOM_INTEGRATION_BASE_URL=$baseUrl"
          Write-Host "AUTH_HEADER=x-api-key"
          Start-Process -FilePath $ts -ArgumentList @("funnel", "--yes", "--bg", "localhost:8787") -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Keep temporary API alive
        shell: pwsh
        run: |
          $minutes = [int]"${{ github.event.inputs.duration_minutes }}"
          if ($minutes -gt 120) { $minutes = 120 }
          if ($minutes -lt 1) { $minutes = 1 }
          $end = (Get-Date).AddMinutes($minutes)
          while ((Get-Date) -lt $end) {
            Write-Host "[$(Get-Date)] Llev approved API active"
            Start-Sleep -Seconds 60
          }
